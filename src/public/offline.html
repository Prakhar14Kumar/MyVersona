<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVerSona - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #FFB88C 0%, #FF6F91 50%, #6DE7C5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #FFB88C, #FF6F91);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .icon svg {
            width: 60px;
            height: 60px;
            stroke: white;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #FFB88C, #FF6F91, #6DE7C5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .retry-button {
            background: linear-gradient(135deg, #FFB88C, #FF6F91);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 111, 145, 0.4);
        }

        .retry-button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 30px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 12px;
            font-size: 14px;
            color: #666;
        }

        .wifi-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin-right: 8px;
            vertical-align: middle;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 24px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 16px;
            }

            .icon {
                width: 100px;
                height: 100px;
            }

            .icon svg {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M1 9l2 2c5-5 13-5 18 0l2-2C16 2 8 2 1 9z"/>
                <path d="M5 13l2 2c3-3 8-3 11 0l2-2c-4-4-11-4-15 0z"/>
                <path d="M9 17l2 2c1-1 3-1 4 0l2-2c-2-2-6-2-8 0z"/>
                <circle cx="12" cy="21" r="1"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
        </div>
        
        <h1>You're Offline</h1>
        
        <p>
            Oops! It looks like you've lost your internet connection. 
            Please check your network and try again.
        </p>

        <button class="retry-button" onclick="window.location.reload()">
            Try Again
        </button>

        <div class="status">
            <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 13a10 10 0 0 1 14 0"/>
                <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
                <path d="M12 20h.01"/>
            </svg>
            <span id="status-text">Checking connection...</span>
        </div>
    </div>

    <script>
        // Check connection status
        function updateStatus() {
            const statusText = document.getElementById('status-text');
            
            if (navigator.onLine) {
                statusText.textContent = 'Back online! Refreshing...';
                statusText.style.color = '#4CAF50';
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } else {
                statusText.textContent = 'Still offline. Waiting for connection...';
                statusText.style.color = '#f44336';
            }
        }

        // Check immediately
        updateStatus();

        // Listen for online/offline events
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);

        // Check periodically
        setInterval(updateStatus, 3000);
    </script>
</body>
</html>
