# render.yaml
# Blueprint to launch the Docker image to a fully managed Render Web Service
services:
  - type: web
    name: versona-backend-api
    env: python
    region: singapore
    
    # Point Render to our FastAPI backend
    rootDir: src/backend
    
    # Build and Start commands
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    
    healthCheckPath: /health
    
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 75
      targetCPUPercent: 70
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: FIREBASE_BASE64_CERT
        sync: false
      - key: WEB_CONCURRENCY
        value: "3"
